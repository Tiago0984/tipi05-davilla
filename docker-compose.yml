services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8081:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - davilla_network

  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    volumes:
      - ./src:/var/www/html
    working_dir: /var/www/html
    depends_on:
      - mysql
    networks:
      - davilla_network

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: davilla
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - davilla_network

  composer:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    volumes:
      - ./src:/var/www/html
    working_dir: /var/www/html
    entrypoint: ["composer"]
    networks:
      - davilla_network

  node:
    image: node:22-alpine
    volumes:
      - ./src:/var/www/html
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    entrypoint: ["sh", "-c"]
    command: "npm install && npm run dev -- --host"
    networks:
      - davilla_network

volumes:
  mysql_data:

networks:
  davilla_network:
    driver: bridge